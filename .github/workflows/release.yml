name: Release

on:
  push:
    branches:
      - main
    paths:
      - 'apps/desktop/**'
  pull_request:
    branches:
      - main
    paths:
      - 'apps/desktop/**'
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
      released: ${{ steps.release.outputs.released }}
    steps:
      - uses: actions/checkout@v4
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: node
          package-name: desktop
          component: desktop

  build:
    needs: release-please
    runs-on: ${{ matrix.os }}
    # Run when release-please created a release OR when a tag is pushed
    if: needs.release-please.outputs.released == 'true' || startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
        include:
          - os: macos-latest
            artifact: dmg
          - os: windows-latest
            artifact: exe
          - os: ubuntu-latest
            artifact: AppImage

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install Dependencies
        run: pnpm install

      - name: Build Desktop App
        run: pnpm --filter @doclocalizer/desktop electron:build
        env:
          NODE_ENV: production

      - name: Find artifacts
        id: artifacts
        shell: bash
        run: |
          case "${{ matrix.os }}" in
            macos-latest)  echo "path=apps/desktop/dist/*.dmg" >> $GITHUB_OUTPUT ;;
            windows-latest) echo "path=apps/desktop/dist/*.exe" >> $GITHUB_OUTPUT ;;
            *)              echo "path=apps/desktop/dist/*.AppImage" >> $GITHUB_OUTPUT ;;
          esac

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ steps.artifacts.outputs.path }}
          draft: false
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
