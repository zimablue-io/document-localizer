name: Build Release

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
        include:
          - os: macos-latest
            artifact: dmg
          - os: windows-latest
            artifact: exe
          - os: ubuntu-latest
            artifact: AppImage

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync version to desktop package.json
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "Syncing version $VERSION to apps/desktop/package.json"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('apps/desktop/package.json', 'utf8'));
            pkg.version = '$VERSION';
            fs.writeFileSync('apps/desktop/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Build Desktop App
        run: pnpm --filter @doclocalizer/desktop electron:build
        env:
          NODE_ENV: production

      - name: Find artifacts
        id: artifacts
        shell: bash
        run: |
          case "${{ matrix.os }}" in
            macos-latest)  echo "path=apps/desktop/dist/*.dmg" >> $GITHUB_OUTPUT ;;
            windows-latest) echo "path=apps/desktop/dist/*.exe" >> $GITHUB_OUTPUT ;;
            *)              echo "path=apps/desktop/dist/*.AppImage" >> $GITHUB_OUTPUT ;;
          esac

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ steps.artifacts.outputs.path }}
          draft: false
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
