name: Build Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    concurrency:
      group: ${{ github.workflow }}-${{ matrix.os }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync version to desktop package.json
        shell: bash
        run: |
          TAG_NAME="${GITHUB_REF/refs\/tags\//}"
          echo "Tag name is: $TAG_NAME"
          if [[ "$TAG_NAME" == desktop-* ]]; then
            VERSION="${TAG_NAME#desktop-}"
            VERSION="${VERSION#v}"
          else
            VERSION="${TAG_NAME#v}"
          fi
          echo "Syncing version $VERSION to apps/desktop/package.json"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('apps/desktop/package.json', 'utf8'));
            pkg.version = '$VERSION';
            fs.writeFileSync('apps/desktop/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Build Desktop App
        run: pnpm --filter @doclocalizer/desktop electron:build
        env:
          NODE_ENV: production

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            apps/desktop/dist/*.dmg
            apps/desktop/dist/*.exe
            apps/desktop/dist/*.AppImage
          draft: false
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
